<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI研究助手 | 李睿鉴</title>
    <meta
      name="description"
      content="ScholarMind AI 公开研究助手。访客可以切换项目、提问、浏览文献、证据、分析与写作内容。"
    />
    <meta name="theme-color" content="#183049" />
    <link rel="stylesheet" href="../project-shell.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  </head>
  <body>
    <div class="project-page">
      <header class="project-topbar">
        <a class="project-brand" href="../../index.html" aria-label="返回首页">
          <span>Li Ruijian</span>
          <strong>李睿鉴</strong>
        </a>

        <nav class="project-nav" aria-label="页面导航">
          <a href="../../index.html">首页</a>
          <a href="#experience">进入体验</a>
          <a href="../../hackathon.html">AI+体育</a>
        </nav>
      </header>

      <main>
        <section class="project-hero compact">
          <div class="hero-copy">
            <p class="eyebrow">ScholarMind AI</p>
            <h1>AI研究助手</h1>
            <p class="hero-lead">面向研究流程的公开工作台，而不是静态介绍页。</p>
            <p class="hero-summary">
              访客可以直接围绕一个研究项目提出问题，查看研究助手如何调用文献、分析结果、证据片段和写作内容来组织回答。
            </p>
            <div class="project-metrics" id="scholarmind-metrics"></div>
          </div>

          <aside class="hero-side">
            <h2>当前可体验</h2>
            <ul class="meta-list">
              <li>研究项目切换</li>
              <li>围绕项目直接提问</li>
              <li>文献、分析、证据、写作联动查看</li>
            </ul>
          </aside>
        </section>

        <section class="workspace" id="experience">
          <aside class="list-panel">
            <div class="panel-header">
              <h2 class="panel-title">研究项目</h2>
              <p class="panel-desc">选择一个公开项目，进入对应研究工作台。</p>
            </div>
            <div class="item-list" id="scholarmind-projects"></div>
          </aside>

          <section class="viewer-panel">
            <div class="viewer-head">
              <h2 class="viewer-title" id="scholarmind-title">加载中</h2>
              <p class="viewer-meta" id="scholarmind-meta"></p>
            </div>

            <div class="panel-header" style="border-bottom: 0;">
              <form class="query-form" id="scholarmind-query-form">
                <label for="scholarmind-query" class="panel-desc">围绕当前项目提出问题</label>
                <div class="search-row">
                  <input
                    class="search-input"
                    id="scholarmind-query"
                    type="search"
                    placeholder="例如：这个项目当前最核心的研究问题是什么？"
                  />
                  <button class="query-submit" type="submit">提问</button>
                </div>
              </form>
              <div class="prompt-grid inline" id="scholarmind-prompts"></div>
            </div>

            <div class="viewer-toolbar">
              <div class="tab-row" id="scholarmind-tabs"></div>
            </div>

            <div class="viewer-surface">
              <div class="viewer-rich" id="scholarmind-body"></div>
            </div>
          </section>
        </section>
      </main>

      <footer class="page-footer">
        <p>公开体验内容来自 `projects/scholarmind-ai` 的数据库快照同步。</p>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
