<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科研项目 | Markdown Reader | 李睿鉴</title>
    <meta
      name="description"
      content="Markdown Reader 公开体验页。访客可以切换文档、查看分析与翻译，并导入本地 Markdown 直接预览。"
    />
    <meta name="theme-color" content="#183049" />
    <link rel="stylesheet" href="../project-shell.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  </head>
  <body>
    <div class="project-page">
      <header class="project-topbar">
        <a class="project-brand" href="../../index.html" aria-label="返回首页">
          <span>Li Ruijian</span>
          <strong>李睿鉴</strong>
        </a>

        <nav class="project-nav" aria-label="页面导航">
          <a href="../../index.html">首页</a>
          <a href="#reader">进入项目</a>
          <a href="../../hackathon.html">AI+体育</a>
        </nav>
      </header>

      <main>
        <section class="project-hero compact">
          <div class="hero-copy">
            <p class="eyebrow">Markdown Reader</p>
            <h1>科研项目</h1>
            <p class="hero-lead">一个用于研究阅读、分析与批判整理的智能阅读器。</p>
            <p class="hero-summary">
              访客可以切换公开文档，查看原文、AI 分析、翻译、批判阅读和信息图结果；也可以上传自己的 Markdown 文件，直接体验阅读器。
            </p>
            <div class="project-metrics" id="reader-metrics"></div>
          </div>

          <aside class="hero-side">
            <h2>当前可体验</h2>
            <ul class="meta-list">
              <li>公开样例文档阅读</li>
              <li>分析 / 翻译 / 批判阅读切换</li>
              <li>本地 Markdown 导入预览</li>
            </ul>
          </aside>
        </section>

        <section class="workspace" id="reader">
          <aside class="list-panel">
            <div class="panel-header">
              <h2 class="panel-title">文档列表</h2>
              <p class="panel-desc">选择样例文档，或在右侧导入自己的 Markdown 文件。</p>
              <input
                class="search-input"
                id="reader-library-search"
                type="search"
                placeholder="筛选样例文档"
              />
            </div>
            <div class="item-list" id="reader-documents"></div>
          </aside>

          <section class="viewer-panel">
            <div class="viewer-head">
              <h2 class="viewer-title" id="reader-title">加载中</h2>
              <p class="viewer-meta" id="reader-meta"></p>
            </div>

            <div class="panel-header" style="border-bottom: 0;">
              <div class="inline-form">
                <input
                  class="search-input"
                  id="reader-search"
                  type="search"
                  placeholder="在当前文档中查找主题或关键词"
                />
                <label class="upload-label" for="reader-upload">
                  导入 Markdown
                  <input id="reader-upload" type="file" accept=".md,text/markdown,text/plain" />
                </label>
              </div>
            </div>

            <div class="viewer-toolbar">
              <div class="tab-row" id="reader-tabs"></div>
            </div>

            <div class="viewer-surface">
              <div class="reader-layout">
                <div class="viewer-rich" id="reader-body"></div>
                <aside class="outline-panel">
                  <h3>目录与检索</h3>
                  <div class="outline-list" id="reader-outline"></div>
                </aside>
              </div>
            </div>
          </section>
        </section>
      </main>

      <footer class="page-footer">
        <p>李睿鉴 | 科研项目</p>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
